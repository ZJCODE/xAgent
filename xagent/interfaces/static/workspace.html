<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xAgent Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {} } };
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg-primary: #f5f5f4;
      --bg-secondary: rgba(255, 255, 255, 0.78);
      --bg-tertiary: rgba(255, 255, 255, 0.58);
      --border-soft: rgba(24, 24, 27, 0.08);
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --shadow-card: 0 10px 30px -18px rgba(24, 24, 27, 0.18);
    }
    .dark {
      color-scheme: dark;
      --bg-primary: #09090b;
      --bg-secondary: rgba(17, 17, 19, 0.78);
      --bg-tertiary: rgba(24, 24, 27, 0.76);
      --border-soft: rgba(255, 255, 255, 0.08);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --shadow-card: 0 18px 40px -24px rgba(0, 0, 0, 0.68);
    }
    html, body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(120, 113, 108, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(120, 113, 108, 0.08), transparent 26%),
        var(--bg-primary);
      color: var(--text-primary);
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 9999px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    .panel-surface {
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
    }
    .panel-muted {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(16px);
    }
    .hero-grid {
      background-image:
        linear-gradient(to right, rgba(24, 24, 27, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(24, 24, 27, 0.04) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .dark .hero-grid {
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    }
    .ghost-button {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(14px);
    }
    .dark .ghost-button { background: rgba(24, 24, 27, 0.72); }
    .nav-link {
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .nav-link:hover { color: var(--text-primary); background: rgba(24, 24, 27, 0.05); }
    .dark .nav-link:hover { background: rgba(255, 255, 255, 0.06); }
    .nav-link.active { color: var(--text-primary); background: rgba(24, 24, 27, 0.08); }
    .dark .nav-link.active { background: rgba(255, 255, 255, 0.1); }
    .field {
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.68);
      color: var(--text-primary);
    }
    .dark .field { background: rgba(24, 24, 27, 0.72); }
    .tree-item, .search-result {
      cursor: pointer;
      padding: 0.42rem 0.65rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      transition: background 0.15s;
      word-break: break-word;
    }
    .tree-item:hover, .search-result:hover { background: rgba(24, 24, 27, 0.05); }
    .dark .tree-item:hover, .dark .search-result:hover { background: rgba(255, 255, 255, 0.06); }
    .tree-item.selected { background: rgba(24, 24, 27, 0.1); font-weight: 600; }
    .dark .tree-item.selected { background: rgba(255, 255, 255, 0.12); }
    .tree-children { padding-left: 0.9rem; }
    .md-content p { margin: 0.5em 0; }
    .md-content pre {
      background: #111827;
      color: #f3f4f6;
      padding: 0.9em 1em;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin: 0.75em 0;
    }
    .md-content :not(pre) > code {
      background: rgba(24, 24, 27, 0.08);
      padding: 0.15em 0.4em;
      border-radius: 0.45rem;
    }
    .dark .md-content :not(pre) > code { background: rgba(255, 255, 255, 0.1); }
    .md-content ul, .md-content ol { padding-left: 1.25rem; margin: 0.5em 0; }
    .md-content ul { list-style: disc; }
    .md-content ol { list-style: decimal; }
    .md-content a { text-decoration: underline; color: #2563eb; }
    .dark .md-content a { color: #60a5fa; }
    .md-content h1 { font-size: 1.45rem; font-weight: 700; margin: 1rem 0 0.45rem; }
    .md-content h2 { font-size: 1.15rem; font-weight: 700; margin: 1rem 0 0.35rem; }
    .md-content h3 { font-size: 1rem; font-weight: 600; margin: 0.8rem 0 0.3rem; }
    .md-content img { max-width: 100%; border-radius: 0.75rem; margin: 0.65em 0; }
  </style>
</head>
<body class="h-full text-gray-900 dark:text-gray-100">
  <div class="hero-grid fixed inset-0 pointer-events-none opacity-70"></div>
  <div class="relative h-full max-w-7xl mx-auto px-3 sm:px-5 py-4 sm:py-6 flex flex-col gap-4">
    <section class="panel-surface flex-1 min-h-0 rounded-[32px] overflow-hidden flex flex-col">
      <header class="px-4 sm:px-6 py-4 sm:py-5 border-b border-black/5 dark:border-white/10">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-4 min-w-0">
            <h1 class="text-xl sm:text-2xl font-semibold tracking-tight shrink-0">xAgent Workspace</h1>
            <nav class="flex flex-wrap items-center gap-1">
              <a href="/" class="nav-link">Chat</a>
              <a href="/group" class="nav-link">Group</a>
              <a href="/memory" class="nav-link">Memory</a>
              <a href="/workspace" class="nav-link active">Workspace</a>
              <a href="/message" class="nav-link">Messages</a>
              <a href="/agent" class="nav-link">Agent</a>
            </nav>
          </div>
        </div>
        <div id="agentInfo" class="mt-3 text-xs text-gray-500 dark:text-gray-400 flex flex-wrap gap-x-4 gap-y-1"></div>
        <div class="mt-3 grid gap-2 lg:grid-cols-[minmax(0,1fr)_auto_auto]">
          <input id="searchInput" type="text" class="field rounded-2xl px-3 py-2 text-sm" placeholder="Search workspace" />
          <button id="searchBtn" class="ghost-button px-4 py-2 rounded-2xl text-sm">Search</button>
          <button id="clearSearchBtn" class="ghost-button px-4 py-2 rounded-2xl text-sm">Clear</button>
        </div>
      </header>

      <div class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-[18rem_minmax(0,1fr)] overflow-hidden">
        <aside class="border-r border-black/5 dark:border-white/10 overflow-y-auto p-3">
          <div id="searchResults" class="hidden space-y-2 mb-3"></div>
          <div class="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-2 px-2">Files</div>
          <div id="treeContainer"></div>
          <div id="treeEmpty" class="hidden text-sm text-gray-400 dark:text-gray-500 text-center py-8">Workspace is empty</div>
        </aside>
        <main class="min-h-0 overflow-hidden grid grid-rows-[auto_minmax(0,1fr)]">
          <div class="px-4 sm:px-6 py-3 border-b border-black/5 dark:border-white/10 flex items-center justify-between gap-3">
            <div class="min-w-0">
              <h2 id="contentTitle" class="text-base font-semibold truncate">No file selected</h2>
              <div id="contentMeta" class="text-xs text-gray-400 dark:text-gray-500 truncate"></div>
            </div>
          </div>
          <div class="min-h-0 overflow-y-auto p-4 sm:p-6">
            <div id="preview" class="md-content leading-relaxed text-sm text-gray-700 dark:text-gray-200"></div>
          </div>
        </main>
      </div>
    </section>
  </div>

<script>
(function() {
  const md = window.markdownit({ html: false, linkify: true, typographer: true });
  const THEME_KEY = 'xagent_theme';
  const state = { selectedPath: '', tree: [] };

  const el = id => document.getElementById(id);
  const treeContainer = el('treeContainer');
  const treeEmpty = el('treeEmpty');
  const preview = el('preview');
  const searchInput = el('searchInput');
  const searchResults = el('searchResults');

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  }
  initTheme();

  async function loadAgentInfo() {
    try {
      const res = await fetch('/api/agent/info');
      const data = await res.json();
      el('agentInfo').innerHTML =
        `<span>Agent: <strong>${esc(data.name || 'agent')}</strong></span>` +
        `<span>Model: <strong>${esc(data.model)}</strong></span>` +
        `<span>Workspace: <strong>${esc(data.workspace_dir || '')}</strong></span>`;
    } catch {}
  }

  async function loadTree() {
    try {
      const res = await fetch('/api/workspace/tree');
      const data = await res.json();
      state.tree = data.tree || [];
      treeContainer.innerHTML = '';
      if (state.tree.length === 0) {
        treeEmpty.classList.remove('hidden');
      } else {
        treeEmpty.classList.add('hidden');
        treeContainer.appendChild(buildTree(state.tree));
      }
    } catch (err) {
      treeContainer.innerHTML = `<div class="text-sm text-red-500 p-2">${esc(err.message)}</div>`;
    }
  }

  function buildTree(nodes) {
    const frag = document.createDocumentFragment();
    for (const node of nodes) {
      if (node.type === 'dir') {
        const wrapper = document.createElement('div');
        const label = document.createElement('div');
        label.className = 'tree-item';
        label.textContent = `[D] ${node.name}`;
        const children = document.createElement('div');
        children.className = 'tree-children hidden';
        children.appendChild(buildTree(node.children || []));
        label.addEventListener('click', () => children.classList.toggle('hidden'));
        wrapper.appendChild(label);
        wrapper.appendChild(children);
        frag.appendChild(wrapper);
      } else {
        const item = document.createElement('div');
        item.className = 'tree-item';
        item.dataset.path = node.path;
        item.textContent = `[F] ${node.name}`;
        item.addEventListener('click', () => selectFile(node.path, item));
        frag.appendChild(item);
      }
    }
    return frag;
  }

  async function selectFile(path, treeItem) {
    document.querySelectorAll('.tree-item.selected').forEach(item => item.classList.remove('selected'));
    if (treeItem) treeItem.classList.add('selected');
    state.selectedPath = path;
    preview.innerHTML = '<div class="text-gray-400 text-sm">Loading...</div>';

    try {
      const res = await fetch(`/api/workspace/read?path=${encodeURIComponent(path)}`);
      if (!res.ok) throw new Error(await responseError(res));
      const data = await res.json();
      renderFile(data);
    } catch (err) {
      preview.innerHTML = `<div class="text-red-500 text-sm">${esc(err.message)}</div>`;
    }
  }

  function renderFile(data) {
    el('contentTitle').textContent = data.path;
    el('contentMeta').textContent = `${data.mime_type || ''}  ${formatBytes(data.size || 0)}  ${data.modified ? new Date(data.modified * 1000).toLocaleString() : ''}`;

    if (data.text) {
      renderPreview(data.path, data.content || '');
      return;
    }

    if ((data.mime_type || '').startsWith('image/')) {
      preview.innerHTML = `<img src="/api/workspace/blob?path=${encodeURIComponent(data.path)}" alt="${esc(data.name)}" />`;
    } else {
      preview.innerHTML = '<div class="panel-muted rounded-xl p-4 text-sm"><div class="font-medium">Binary file</div></div>';
    }
  }

  function renderPreview(path, text) {
    if (path.toLowerCase().endsWith('.md') || path.toLowerCase().endsWith('.markdown')) {
      preview.innerHTML = md.render(text || '');
    } else {
      const pre = document.createElement('pre');
      pre.textContent = text || '';
      preview.innerHTML = '';
      preview.appendChild(pre);
    }
  }

  async function runSearch() {
    const query = searchInput.value.trim();
    if (!query) {
      clearSearch();
      return;
    }
    searchResults.classList.remove('hidden');
    searchResults.innerHTML = '<div class="text-sm text-gray-400 px-1">Searching...</div>';
    try {
      const res = await fetch(`/api/workspace/search?query=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error(await responseError(res));
      const data = await res.json();
      renderSearchResults(data.results || []);
    } catch (err) {
      searchResults.innerHTML = `<div class="text-sm text-red-500 px-1">${esc(err.message)}</div>`;
    }
  }

  function renderSearchResults(results) {
    if (!results.length) {
      searchResults.innerHTML = '<div class="text-sm text-gray-400 px-1">No results found</div>';
      return;
    }
    searchResults.innerHTML = results.map(result => `
      <div class="search-result" data-path="${esc(result.path)}">
        <div class="text-xs text-gray-400 dark:text-gray-500">${esc((result.matched_in || []).join(', '))}</div>
        <div class="text-sm font-medium mt-1">${esc(result.path)}</div>
        ${result.snippet ? `<div class="text-xs text-gray-500 dark:text-gray-400 mt-1 leading-5">${esc(result.snippet)}</div>` : ''}
      </div>
    `).join('');
    searchResults.querySelectorAll('.search-result').forEach(item => {
      item.addEventListener('click', () => selectFile(item.dataset.path, null));
    });
  }

  function clearSearch() {
    searchInput.value = '';
    searchResults.innerHTML = '';
    searchResults.classList.add('hidden');
  }

  async function responseError(res) {
    try {
      const data = await res.json();
      return data.detail || `HTTP ${res.status}`;
    } catch {
      return `HTTP ${res.status}`;
    }
  }

  function formatBytes(bytes) {
    if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let value = bytes;
    let index = 0;
    while (value >= 1024 && index < units.length - 1) {
      value /= 1024;
      index += 1;
    }
    return `${value.toFixed(value >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
  }

  function esc(value) {
    const div = document.createElement('div');
    div.textContent = value || '';
    return div.innerHTML;
  }

  el('searchBtn').addEventListener('click', runSearch);
  el('clearSearchBtn').addEventListener('click', clearSearch);
  searchInput.addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      runSearch();
    }
  });

  loadAgentInfo();
  loadTree();
})();
</script>
</body>
</html>
