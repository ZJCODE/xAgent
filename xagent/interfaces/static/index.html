<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xAgent Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    };
  </script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 9999px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }

    .msg-content p { margin: 0.4em 0; }
    .msg-content pre { background: #0f172a; color: #e2e8f0; padding: 0.8em; border-radius: 0.6rem; overflow-x: auto; margin: 0.6em 0; }
    .msg-content :not(pre) > code { background: #e5e7eb; padding: 0.15em 0.35em; border-radius: 0.35rem; }
    .dark .msg-content :not(pre) > code { background: #334155; }
    .msg-content img { max-width: min(100%, 460px); border-radius: 0.5rem; margin: 0.5em 0; }
    .msg-content ul, .msg-content ol { padding-left: 1.25rem; margin: 0.4em 0; }
    .msg-content ul { list-style: disc; }
    .msg-content ol { list-style: decimal; }
    .msg-content a { text-decoration: underline; color: #2563eb; }
    .dark .msg-content a { color: #60a5fa; }

    .typing-cursor::after { content: '▍'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100">
  <div class="h-full max-w-6xl mx-auto px-3 sm:px-5 py-4 sm:py-6 flex flex-col gap-3">
    <header class="rounded-2xl border border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gray-900/80 backdrop-blur px-4 sm:px-5 py-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-lg sm:text-xl font-semibold tracking-tight">xAgent Chat</h1>
          <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">Connected to current server automatically</p>
        </div>
        <div class="flex items-center gap-2">
          <div id="healthDot" class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800">
            <span class="w-2 h-2 rounded-full bg-gray-400"></span>
            <span>Checking...</span>
          </div>
          <button id="toggleThemeBtn" class="text-sm px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition">Theme</button>
        </div>
      </div>

      <details class="mt-3 group rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/80 dark:bg-gray-900/70">
        <summary class="cursor-pointer list-none px-3 py-2.5 text-sm font-medium flex items-center justify-between">
          <span>Advanced</span>
          <span class="text-gray-500 group-open:rotate-180 transition">⌄</span>
        </summary>
        <div class="px-3 pb-3 grid grid-cols-1 md:grid-cols-2 gap-3">
          <label class="text-sm">
            <span class="block text-xs text-gray-500 mb-1">User ID</span>
            <input id="userId" type="text" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </label>
          <label class="text-sm">
            <span class="block text-xs text-gray-500 mb-1">Session ID</span>
            <input id="sessionId" type="text" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </label>
          <label class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
            <input id="optStream" type="checkbox" class="accent-blue-600" checked />
            <span>Streaming</span>
          </label>
          <label class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
            <input id="optShared" type="checkbox" class="accent-blue-600" />
            <span>Shared mode</span>
          </label>
          <label class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
            <input id="optMemory" type="checkbox" class="accent-blue-600" />
            <span>Enable memory</span>
          </label>
          <div class="flex justify-start md:justify-end">
            <button id="clearSessionBtn" class="text-sm px-3 py-2 rounded-lg border border-red-200 text-red-600 dark:border-red-900 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/40 transition">Clear Session</button>
          </div>
        </div>
      </details>
    </header>

    <main class="flex-1 min-h-0 rounded-2xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 flex flex-col overflow-hidden">
      <section id="messages" class="flex-1 min-h-0 overflow-y-auto px-3 sm:px-5 py-4 space-y-4">
        <div id="welcome" class="h-full min-h-[260px] flex items-center justify-center text-center text-gray-500 dark:text-gray-400 text-sm">
          <div>
            <p class="font-medium text-gray-700 dark:text-gray-300">Start a conversation</p>
            <p class="mt-1">Type a message and press Enter to send.</p>
          </div>
        </div>
      </section>

      <section id="imagePreview" class="hidden border-t border-gray-200 dark:border-gray-800 px-3 sm:px-5 py-3 bg-gray-50/80 dark:bg-gray-900/70">
      </section>

      <section class="border-t border-gray-200 dark:border-gray-800 px-3 sm:px-5 py-3 bg-white dark:bg-gray-900">
        <div class="flex items-end gap-2 sm:gap-3">
          <button id="imageBtn" title="Upload image" class="h-10 w-10 shrink-0 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center justify-center transition">
            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </button>
          <input id="imageInput" type="file" accept="image/jpeg,image/png" multiple class="hidden" />

          <textarea id="chatInput" rows="1" placeholder="Message xAgent..."
            class="flex-1 resize-none max-h-40 overflow-y-auto px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>

          <button id="sendBtn" title="Send" class="h-10 px-4 shrink-0 rounded-xl bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
            Send
          </button>
        </div>
      </section>
    </main>
  </div>

<script>
const API_BASE = '';
const STORAGE_KEY = 'xagent_web_settings_v2';

const state = {
  messages: [],
  pendingImages: [],
  sending: false,
};

const md = window.markdownit({ html: true, linkify: true, breaks: true });

function generateId() {
  return 'sess_' + Math.random().toString(36).slice(2, 10);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text ?? '');
  return div.innerHTML;
}

function saveSettings() {
  const settings = {
    userId: document.getElementById('userId').value,
    sessionId: document.getElementById('sessionId').value,
    stream: document.getElementById('optStream').checked,
    shared: document.getElementById('optShared').checked,
    memory: document.getElementById('optMemory').checked,
    darkMode: document.documentElement.classList.contains('dark'),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function restoreSettings() {
  const settings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  document.getElementById('userId').value = settings.userId || 'web_user';
  document.getElementById('sessionId').value = settings.sessionId || generateId();
  document.getElementById('optStream').checked = settings.stream !== false;
  document.getElementById('optShared').checked = !!settings.shared;
  document.getElementById('optMemory').checked = !!settings.memory;

  const shouldDark = settings.darkMode || (!('darkMode' in settings) && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', !!shouldDark);
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  saveSettings();
}

async function checkHealth() {
  const dot = document.getElementById('healthDot');
  try {
    const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span><span>Online</span>';
    } else {
      dot.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500"></span><span>Error ${res.status}</span>`;
    }
  } catch {
    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span><span>Offline</span>';
  }
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = `${Math.min(textarea.scrollHeight, 160)}px`;
}

function scrollToBottom() {
  const container = document.getElementById('messages');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function renderMarkdown(target, content) {
  target.innerHTML = md.render(content);
}

function appendMessageBubble(message, placeholder = false) {
  const container = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const wrapper = document.createElement('div');
  wrapper.className = `flex ${message.role === 'user' ? 'justify-end' : 'justify-start'}`;

  const bubble = document.createElement('div');
  const isUser = message.role === 'user';
  bubble.className = `max-w-[90%] sm:max-w-[78%] lg:max-w-[68%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${isUser
    ? 'bg-blue-600 text-white rounded-br-md'
    : 'bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-bl-md'}`;

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';
  if (placeholder) {
    contentEl.innerHTML = '<span class="text-gray-400">Thinking...</span>';
  } else if (message.content) {
    renderMarkdown(contentEl, message.content);
  }
  bubble.appendChild(contentEl);

  if (isUser && message.images && message.images.length) {
    const imageRow = document.createElement('div');
    imageRow.className = 'mt-2 flex flex-wrap gap-2';
    message.images.forEach((src) => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'h-20 rounded-lg border border-white/30 object-cover';
      imageRow.appendChild(img);
    });
    bubble.appendChild(imageRow);
  }

  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  scrollToBottom();
  return { wrapper, contentEl };
}

function renderImagePreview() {
  const preview = document.getElementById('imagePreview');
  if (!state.pendingImages.length) {
    preview.classList.add('hidden');
    preview.innerHTML = '';
    return;
  }

  preview.classList.remove('hidden');
  preview.innerHTML = state.pendingImages.map((src, index) => `
    <div class="inline-flex items-center gap-2 mr-2 mb-2 pr-2 py-1 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
      <img src="${src}" class="h-10 w-10 rounded object-cover" />
      <button class="text-xs text-red-600 dark:text-red-400" onclick="removePendingImage(${index})">Remove</button>
    </div>
  `).join('');
}

function removePendingImage(index) {
  state.pendingImages.splice(index, 1);
  renderImagePreview();
}

function clearPendingImages() {
  state.pendingImages = [];
  renderImagePreview();
}

function setSending(sending) {
  state.sending = sending;
  document.getElementById('sendBtn').disabled = sending;
  document.getElementById('chatInput').disabled = sending;
}

async function regularChat(payload, contentEl, messageIndex) {
  contentEl.innerHTML = '<span class="text-gray-400">Thinking...</span>';

  const response = await fetch(`${API_BASE}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (!response.ok) {
    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
  }

  const result = await response.json();
  const reply = result.reply;
  if (typeof reply === 'object') {
    const text = JSON.stringify(reply, null, 2);
    contentEl.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
    state.messages[messageIndex].content = text;
    return;
  }

  renderMarkdown(contentEl, reply || '');
  state.messages[messageIndex].content = reply || '';
}

async function streamChat(payload, contentEl, messageIndex) {
  contentEl.classList.add('typing-cursor');

  const response = await fetch(`${API_BASE}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
    body: JSON.stringify(payload),
  });

  if (!response.ok) {
    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      const payloadChunk = trimmed.slice(6);
      if (payloadChunk === '[DONE]') continue;

      try {
        const parsed = JSON.parse(payloadChunk);
        if (parsed.error) throw new Error(parsed.error);
        if (parsed.delta) {
          fullText += parsed.delta;
          renderMarkdown(contentEl, fullText);
          scrollToBottom();
          continue;
        }
        if (parsed.message) {
          if (typeof parsed.message === 'object') {
            fullText = JSON.stringify(parsed.message, null, 2);
            contentEl.innerHTML = `<pre>${escapeHtml(fullText)}</pre>`;
          } else {
            fullText = parsed.message;
            renderMarkdown(contentEl, fullText);
          }
          scrollToBottom();
        }
      } catch (error) {
        const errText = String(error?.message || error);
        if (!errText.includes('JSON')) {
          throw error;
        }
      }
    }
  }

  state.messages[messageIndex].content = fullText;
  contentEl.classList.remove('typing-cursor');
}

async function sendMessage() {
  if (state.sending) return;

  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const currentImages = [...state.pendingImages];
  clearPendingImages();

  const userMessage = { role: 'user', content: text, images: currentImages };
  state.messages.push(userMessage);
  appendMessageBubble(userMessage);

  input.value = '';
  input.style.height = 'auto';

  const payload = {
    user_id: document.getElementById('userId').value.trim() || 'web_user',
    session_id: document.getElementById('sessionId').value.trim() || generateId(),
    user_message: text,
    stream: document.getElementById('optStream').checked,
    enable_memory: document.getElementById('optMemory').checked,
    shared: document.getElementById('optShared').checked,
  };

  if (currentImages.length === 1) {
    payload.image_source = currentImages[0];
  } else if (currentImages.length > 1) {
    payload.image_source = currentImages;
  }

  setSending(true);
  saveSettings();

  const assistantMessage = { role: 'assistant', content: '' };
  state.messages.push(assistantMessage);
  const messageIndex = state.messages.length - 1;
  const { contentEl } = appendMessageBubble(assistantMessage, true);

  try {
    if (payload.stream) {
      await streamChat(payload, contentEl, messageIndex);
    } else {
      await regularChat(payload, contentEl, messageIndex);
    }
  } catch (error) {
    const errText = String(error?.message || error);
    contentEl.classList.remove('typing-cursor');
    contentEl.innerHTML = `<div class="text-red-500">Error: ${escapeHtml(errText)}</div>`;
    state.messages[messageIndex].content = `Error: ${errText}`;
  } finally {
    setSending(false);
    scrollToBottom();
  }
}

async function clearSession() {
  const userId = document.getElementById('userId').value.trim() || 'web_user';
  const sessionId = document.getElementById('sessionId').value.trim() || generateId();

  try {
    const response = await fetch(`${API_BASE}/clear_session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, session_id: sessionId }),
    });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (error) {
    console.warn('Clear session request failed:', error);
  }

  state.messages = [];
  const container = document.getElementById('messages');
  container.innerHTML = `
    <div id="welcome" class="h-full min-h-[260px] flex items-center justify-center text-center text-gray-500 dark:text-gray-400 text-sm">
      <div>
        <p class="font-medium text-gray-700 dark:text-gray-300">Start a conversation</p>
        <p class="mt-1">Type a message and press Enter to send.</p>
      </div>
    </div>
  `;
}

function bindEvents() {
  const chatInput = document.getElementById('chatInput');
  const imageInput = document.getElementById('imageInput');

  ['userId', 'sessionId', 'optStream', 'optShared', 'optMemory'].forEach((id) => {
    document.getElementById(id).addEventListener('change', saveSettings);
  });

  document.getElementById('toggleThemeBtn').addEventListener('click', toggleTheme);
  document.getElementById('clearSessionBtn').addEventListener('click', clearSession);
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('imageBtn').addEventListener('click', () => imageInput.click());

  imageInput.addEventListener('change', (event) => {
    const files = Array.from(event.target.files || []);
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = (loadEvent) => {
        state.pendingImages.push(loadEvent.target.result);
        renderImagePreview();
      };
      reader.readAsDataURL(file);
    });
    event.target.value = '';
  });

  chatInput.addEventListener('input', () => autoResize(chatInput));
  chatInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  restoreSettings();
  bindEvents();
  await checkHealth();
  document.getElementById('chatInput').focus();
});
</script>
</body>
</html>
