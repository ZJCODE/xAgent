<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xAgent Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg-primary: #f5f5f4;
      --bg-secondary: rgba(255, 255, 255, 0.78);
      --bg-tertiary: rgba(255, 255, 255, 0.58);
      --border-soft: rgba(24, 24, 27, 0.08);
      --border-strong: rgba(24, 24, 27, 0.12);
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --shadow-soft: 0 18px 60px -28px rgba(24, 24, 27, 0.22);
      --shadow-card: 0 10px 30px -18px rgba(24, 24, 27, 0.18);
    }

    .dark {
      color-scheme: dark;
      --bg-primary: #09090b;
      --bg-secondary: rgba(17, 17, 19, 0.78);
      --bg-tertiary: rgba(24, 24, 27, 0.76);
      --border-soft: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --shadow-soft: 0 24px 80px -36px rgba(0, 0, 0, 0.75);
      --shadow-card: 0 18px 40px -24px rgba(0, 0, 0, 0.68);
    }

    html, body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(120, 113, 108, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(120, 113, 108, 0.08), transparent 26%),
        var(--bg-primary);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 9999px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }

    .panel-surface {
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
    }

    .panel-muted {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(16px);
    }

    .msg-content {
      word-break: break-word;
    }

    .msg-content p { margin: 0.5em 0; }
    .msg-content pre {
      background: #111827;
      color: #f3f4f6;
      padding: 0.9em 1em;
      border-radius: 1rem;
      overflow-x: auto;
      margin: 0.75em 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .msg-content :not(pre) > code {
      background: rgba(24, 24, 27, 0.08);
      padding: 0.15em 0.4em;
      border-radius: 0.45rem;
    }
    .dark .msg-content :not(pre) > code { background: rgba(255, 255, 255, 0.1); }
    .msg-content img { max-width: min(100%, 460px); border-radius: 0.9rem; margin: 0.65em 0; }
    .msg-content ul, .msg-content ol { padding-left: 1.25rem; margin: 0.5em 0; }
    .msg-content ul { list-style: disc; }
    .msg-content ol { list-style: decimal; }
    .msg-content a { text-decoration: underline; color: #2563eb; }
    .dark .msg-content a { color: #60a5fa; }

    .hero-grid {
      background-image:
        linear-gradient(to right, rgba(24, 24, 27, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(24, 24, 27, 0.04) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .dark .hero-grid {
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    }

    .fade-mask {
      mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 94%, transparent 100%);
    }

    .assistant-bubble {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(24, 24, 27, 0.08);
      box-shadow: var(--shadow-card);
    }

    .dark .assistant-bubble {
      background: rgba(24, 24, 27, 0.78);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .user-bubble {
      background: #18181b;
      color: #fafafa;
      box-shadow: var(--shadow-card);
    }

    .dark .user-bubble {
      background: #fafafa;
      color: #18181b;
    }

    .observation-bubble {
      background: rgba(14, 165, 233, 0.08);
      border: 1px solid rgba(14, 165, 233, 0.16);
      color: var(--text-primary);
      box-shadow: var(--shadow-card);
    }

    .dark .observation-bubble {
      background: rgba(14, 165, 233, 0.11);
      border-color: rgba(56, 189, 248, 0.2);
    }

    .silence-bubble {
      background: rgba(113, 113, 122, 0.08);
      border: 1px solid rgba(113, 113, 122, 0.14);
      color: var(--text-secondary);
    }

    .observe-grid {
      display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.6rem;
      align-items: end;
    }

    @media (max-width: 768px) {
      .observe-grid {
        grid-template-columns: 1fr;
      }
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(14px);
    }

    .dark .ghost-button {
      background: rgba(24, 24, 27, 0.72);
    }

    .setting-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      min-height: 40px;
      padding: 0;
      color: var(--text-secondary);
    }

    .setting-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-track {
      position: relative;
      width: 42px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 999px;
      background: rgba(24, 24, 27, 0.12);
      border: 1px solid rgba(24, 24, 27, 0.08);
      transition: all 0.25s ease;
      box-shadow: inset 0 1px 2px rgba(24, 24, 27, 0.08);
    }

    .dark .toggle-track {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.32);
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(24, 24, 27, 0.18);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dark .toggle-track::after {
      background: #fafafa;
    }

    .setting-toggle input:checked + .toggle-track {
      background: #18181b;
      border-color: #18181b;
      box-shadow: 0 8px 20px -12px rgba(24, 24, 27, 0.65);
    }

    .dark .setting-toggle input:checked + .toggle-track {
      background: #fafafa;
      border-color: #fafafa;
      box-shadow: 0 8px 20px -12px rgba(255, 255, 255, 0.35);
    }

    .setting-toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: #ffffff;
    }

    .dark .setting-toggle input:checked + .toggle-track::after {
      background: #18181b;
    }

    .setting-toggle input:focus-visible + .toggle-track {
      outline: 2px solid #18181b;
      outline-offset: 2px;
    }

    .dark .setting-toggle input:focus-visible + .toggle-track {
      outline-color: #fafafa;
    }

    .setting-toggle-text {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .settings-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding: 1rem 1.15rem;
      border-radius: 1.5rem;
    }

    .settings-actions {
      display: flex;
      margin-left: auto;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .inline-field {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 220px;
      min-height: 44px;
      padding: 0 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(24, 24, 27, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .dark .inline-field {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .inline-label {
      flex-shrink: 0;
      font-size: 0.68rem;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .inline-input {
      min-width: 180px;
      background: transparent;
      color: var(--text-primary);
      outline: none;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .inline-input::placeholder {
      color: var(--text-secondary);
    }

    .inline-switch {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      gap: 0.65rem;
      padding: 0 0.35rem 0 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(24, 24, 27, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .dark .inline-switch {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .inline-switch .setting-toggle {
      padding: 0;
      min-height: auto;
      gap: 0.65rem;
    }

    @media (max-width: 640px) {
      .settings-bar {
        align-items: stretch;
        padding: 0.85rem;
      }

      .settings-actions {
        width: 100%;
        margin-left: 0;
        justify-content: flex-start;
      }

      .inline-field {
        width: 100%;
        min-width: 0;
      }

      .inline-switch {
        justify-content: space-between;
        width: calc(50% - 0.4rem);
      }

      .inline-input {
        min-width: 0;
        width: 100%;
      }
    }

    .nav-link {
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .nav-link:hover { color: var(--text-primary); background: rgba(24, 24, 27, 0.05); }
    .dark .nav-link:hover { background: rgba(255, 255, 255, 0.06); }
    .nav-link.active {
      color: var(--text-primary);
      background: rgba(24, 24, 27, 0.08);
    }
    .dark .nav-link.active { background: rgba(255, 255, 255, 0.1); }

    .typing-cursor::after { content: '▍'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Dual-mode layout */
    .dual-container {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .dual-container > .chat-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dual-container > .panel-divider {
      width: 1px;
      flex-shrink: 0;
      background: var(--border-strong);
    }

    .panel-settings-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border-soft);
      background: var(--bg-tertiary);
    }

    .panel-settings-bar .inline-field {
      min-width: 120px;
      min-height: 34px;
      padding: 0 0.65rem;
    }

    .panel-settings-bar .inline-input {
      min-width: 80px;
      font-size: 0.85rem;
    }

    .panel-settings-bar .inline-switch {
      min-height: 34px;
      padding: 0 0.25rem 0 0.65rem;
    }

    .panel-settings-bar .setting-toggle-text {
      font-size: 0.78rem;
    }

    .panel-settings-bar .toggle-track {
      width: 34px;
      height: 21px;
    }

    .panel-settings-bar .toggle-track::after {
      width: 15px;
      height: 15px;
      top: 2px;
      left: 2px;
    }

    .panel-settings-bar .setting-toggle input:checked + .toggle-track::after {
      transform: translateX(13px);
    }

    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .panel-label-left {
      background: rgba(59, 130, 246, 0.10);
      color: #3b82f6;
    }

    .dark .panel-label-left {
      background: rgba(96, 165, 250, 0.12);
      color: #60a5fa;
    }

    .panel-label-right {
      background: rgba(168, 85, 247, 0.10);
      color: #a855f7;
    }

    .dark .panel-label-right {
      background: rgba(192, 132, 252, 0.12);
      color: #c084fc;
    }

    .panel-clear-btn {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      transition: opacity 0.2s;
      margin-left: auto;
    }

    .panel-clear-btn:hover { opacity: 0.6; }

    @media (max-width: 768px) {
      .dual-container {
        flex-direction: column;
      }

      .dual-container > .panel-divider {
        width: 100%;
        height: 1px;
      }
    }
  </style>
</head>
<body class="h-full text-gray-900 dark:text-gray-100">
  <div class="hero-grid fixed inset-0 pointer-events-none opacity-70"></div>
  <div class="relative h-full max-w-6xl mx-auto px-3 sm:px-5 py-4 sm:py-6 flex flex-col gap-4">
    <section class="panel-surface flex-1 min-h-0 rounded-[32px] overflow-hidden flex flex-col">
      <header class="px-4 sm:px-6 py-4 sm:py-5 border-b border-black/5 dark:border-white/10">
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="flex flex-wrap items-center gap-4">
              <h1 class="text-xl sm:text-2xl font-semibold tracking-[-0.03em]">xAgent Chat</h1>
              <nav class="flex flex-wrap items-center gap-1">
                <a href="/" class="nav-link active">Chat</a>
                <a href="/group" class="nav-link">Group</a>
                <a href="/memory" class="nav-link">Memory</a>
                <a href="/message" class="nav-link">Messages</a>
                <a href="/agent" class="nav-link">Agent</a>
              </nav>
            </div>
            <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mt-1">Quiet visuals, focused exchange, connected to the current server.</p>
          </div>
          <div class="flex items-center gap-2">
            <div id="healthDot" class="ghost-button text-xs sm:text-sm text-gray-500 dark:text-gray-400 inline-flex items-center gap-2 px-3 py-1.5 rounded-full">
              <span class="w-2 h-2 rounded-full bg-gray-400"></span>
              <span>Checking...</span>
            </div>
            <label class="ghost-button text-sm px-3 py-1.5 rounded-full inline-flex items-center gap-2 cursor-pointer hover:bg-white/80 dark:hover:bg-gray-900 transition">
              <span>Dual</span>
              <input id="optDual" type="checkbox" class="w-3.5 h-3.5 accent-current" />
            </label>
            <button id="toggleThemeBtn" class="ghost-button text-sm px-3 py-1.5 rounded-full hover:bg-white/80 dark:hover:bg-gray-900 transition">Theme</button>
          </div>
        </div>

        <div class="settings-bar panel-muted" id="globalSettingsBar">
          <label class="inline-field text-sm">
            <span class="inline-label">User</span>
            <input id="userId" type="text" class="inline-input text-sm" />
          </label>

          <div class="settings-actions">
            <div class="inline-switch">
              <label class="setting-toggle cursor-pointer">
                <span class="setting-toggle-text">Token Stream</span>
                <input id="optTokenStream" type="checkbox" checked />
                <span class="toggle-track" aria-hidden="true"></span>
              </label>
            </div>

            <div class="inline-switch">
              <label class="setting-toggle cursor-pointer">
                <span class="setting-toggle-text">Memory</span>
                <input id="optMemory" type="checkbox" checked />
                <span class="toggle-track" aria-hidden="true"></span>
              </label>
            </div>

            <div class="inline-switch">
              <label class="setting-toggle cursor-pointer">
                <span class="setting-toggle-text">Private</span>
                <input id="optPrivate" type="checkbox" />
                <span class="toggle-track" aria-hidden="true"></span>
              </label>
            </div>

            <div class="inline-switch" style="padding-left: 1rem; padding-right: 1rem;">
              <button id="clearChatBtn" class="setting-toggle-text hover:opacity-70 transition-opacity cursor-pointer" title="Clear chat history">
                Clear Chat
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="mainArea" class="flex-1 min-h-0 flex flex-col overflow-hidden">
      <!-- Populated by JS: single panel or dual panels -->
      </main>
    </section>
  </div>

<script>
const API_BASE = '';
const STORAGE_KEY = 'xagent_web_settings';
const HISTORY_KEY = 'xagent_chat_history';
const DUAL_MODE_KEY = 'xagent_dual_mode';

const md = window.markdownit({ html: true, linkify: true, breaks: true });

/** Active panel instances — destroyed/recreated on mode switch */
let panels = [];

/* ─── Shared utilities ─── */

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text ?? '');
  return div.innerHTML;
}

function renderMarkdown(target, content) {
  target.innerHTML = md.render(content);
}

function autoResize(textarea) {
  const computedStyle = window.getComputedStyle(textarea);
  const parsedMaxHeight = Number.parseFloat(computedStyle.maxHeight);
  const maxHeight = Number.isFinite(parsedMaxHeight) ? parsedMaxHeight : 160;
  textarea.style.height = 'auto';
  textarea.style.height = `${Math.min(textarea.scrollHeight, maxHeight)}px`;
  textarea.style.overflowY = textarea.scrollHeight > maxHeight ? 'auto' : 'hidden';
}

/* ─── Global settings (single-mode only) ─── */

function saveGlobalSettings() {
  const settings = {
    userId: document.getElementById('userId').value,
    tokenStream: document.getElementById('optTokenStream').checked,
    memory: document.getElementById('optMemory').checked,
    private: document.getElementById('optPrivate').checked,
    darkMode: document.documentElement.classList.contains('dark'),
    dual: document.getElementById('optDual').checked,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function restoreGlobalSettings() {
  const settings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  document.getElementById('userId').value = settings.userId || 'web_user';
  document.getElementById('optTokenStream').checked = settings.tokenStream !== false;
  document.getElementById('optMemory').checked = settings.memory !== false;
  document.getElementById('optPrivate').checked = !!settings.private;
  document.getElementById('optDual').checked = !!settings.dual;

  const shouldDark = settings.darkMode || (!('darkMode' in settings) && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', !!shouldDark);
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  saveGlobalSettings();
  // Update private banners in all panels
  panels.forEach(p => p.updatePrivateIndicator());
  updateGlobalPrivateIndicator();
}

async function checkHealth() {
  const dot = document.getElementById('healthDot');
  try {
    const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span><span>Online</span>';
    } else {
      dot.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500"></span><span>Error ${res.status}</span>`;
    }
  } catch {
    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span><span>Offline</span>';
  }
}

/* ─── Welcome HTML template ─── */

function welcomeHTML(idPrefix) {
  return `
    <div id="${idPrefix}_welcome" class="h-full min-h-[320px] flex items-center justify-center text-center text-gray-500 dark:text-gray-400 text-sm">
      <div class="max-w-md px-4">
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-[24px] panel-muted shadow-sm">
          <svg class="w-7 h-7 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M8 10h8M8 14h5m-7 6h12a2 2 0 002-2V8.828a2 2 0 00-.586-1.414l-2.828-2.828A2 2 0 0015.172 4H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <p class="font-semibold text-base text-gray-800 dark:text-gray-100 tracking-[-0.02em]">Start a message stream</p>
        <p class="mt-2 leading-6">Type a message and press Enter to send.</p>
        <div class="mt-5 flex flex-wrap justify-center gap-2 text-xs">
          <span class="panel-muted rounded-full px-3 py-1.5">Enter to send</span>
          <span class="panel-muted rounded-full px-3 py-1.5">Shift + Enter for newline</span>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   Chat Panel Factory — creates a fully isolated panel
   ═══════════════════════════════════════════════════════ */

function createChatPanel(panelId, containerEl, options = {}) {
  const { showPanelSettings = false, panelLabel = '', panelLabelClass = '' } = options;
  const settingsKey = `${STORAGE_KEY}_${panelId}`;
  const historyKey = `${HISTORY_KEY}_${panelId}`;
  const el = (suffix) => containerEl.querySelector(`[data-pid="${panelId}_${suffix}"]`);

  const state = {
    messages: [],
    pendingImages: [],
    sending: false,
  };

  /* ── Build DOM ── */

  function buildHTML() {
    const settingsHTML = showPanelSettings ? `
      <div class="panel-settings-bar">
        <span class="panel-label ${panelLabelClass}">${panelLabel}</span>
        <label class="inline-field text-sm">
          <span class="inline-label">User</span>
          <input data-pid="${panelId}_userId" type="text" class="inline-input text-sm" value="web_user" />
        </label>
        <div class="inline-switch">
          <label class="setting-toggle cursor-pointer">
            <span class="setting-toggle-text">Token</span>
            <input data-pid="${panelId}_optTokenStream" type="checkbox" checked />
            <span class="toggle-track" aria-hidden="true"></span>

        </div>
        <div class="inline-switch">
          <label class="setting-toggle cursor-pointer">
            <span class="setting-toggle-text">Memory</span>
            <input data-pid="${panelId}_optMemory" type="checkbox" checked />
            <span class="toggle-track" aria-hidden="true"></span>

        <div class="inline-switch">
          <label class="setting-toggle cursor-pointer">
            <span class="setting-toggle-text">Private</span>
            <input data-pid="${panelId}_optPrivate" type="checkbox" />

          </label>
        </div>
        <button data-pid="${panelId}_clearBtn" class="panel-clear-btn" title="Clear chat">Clear</button>
      </div>` : '';

    containerEl.innerHTML = `
      ${settingsHTML}
      <section data-pid="${panelId}_messages" class="fade-mask flex-1 min-h-0 overflow-y-auto px-3 sm:px-6 py-4 sm:py-6 space-y-4">

      </section>
      <section data-pid="${panelId}_imagePreview" class="hidden border-t border-black/5 dark:border-white/10 px-3 sm:px-6 py-3 bg-white/20 dark:bg-black/10">
      </section>
      <section class="border-t border-black/5 dark:border-white/10 px-3 sm:px-6 py-3 bg-white/10 dark:bg-black/10">
        <div class="observe-grid">
          <textarea data-pid="${panelId}_observeInput" rows="1" placeholder="Observe context..."
            class="min-h-[46px] leading-6 resize-none max-h-28 overflow-hidden px-4 py-3 rounded-2xl border border-black/5 dark:border-white/10 bg-white/80 dark:bg-black/20 focus:outline-none focus:ring-2 focus:ring-sky-700 dark:focus:ring-sky-300 placeholder:text-gray-400 dark:placeholder:text-gray-500"
          ></textarea>
          <button data-pid="${panelId}_observeBtn" title="Observe" class="h-11 px-5 shrink-0 rounded-2xl bg-sky-700 text-white dark:bg-sky-300 dark:text-gray-950 hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium">
            Observe
          </button>
        </div>
      </section>
      <section class="border-t border-black/5 dark:border-white/10 px-3 sm:px-6 py-4 bg-transparent">
        <div class="panel-muted rounded-[28px] p-2 sm:p-3 flex items-end gap-2 sm:gap-3">
          <button data-pid="${panelId}_imageBtn" title="Upload image" class="ghost-button h-11 w-11 shrink-0 rounded-2xl hover:bg-white dark:hover:bg-gray-900 flex items-center justify-center transition">
            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </button>
          <input data-pid="${panelId}_imageInput" type="file" accept="image/jpeg,image/png" multiple class="hidden" />
          <textarea data-pid="${panelId}_chatInput" rows="1" placeholder="Message xAgent..."
            class="flex-1 min-h-[46px] leading-6 resize-none max-h-40 overflow-hidden px-4 py-3 rounded-2xl border border-black/5 dark:border-white/10 bg-white/80 dark:bg-black/20 focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white placeholder:text-gray-400 dark:placeholder:text-gray-500"
          ></textarea>
          <button data-pid="${panelId}_sendBtn" title="Send" class="h-11 px-5 shrink-0 rounded-2xl bg-gray-950 text-white dark:bg-white dark:text-gray-950 hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium">
            Send
          </button>
        </div>
      </section>`;
  }

  /* ── Settings ── */

  function getSettings() {
    if (showPanelSettings) {
      return {
        userId: (el('userId')?.value || '').trim() || 'web_user',
        tokenStream: el('optTokenStream')?.checked ?? true,
        memory: el('optMemory')?.checked ?? true,
        private: el('optPrivate')?.checked ?? false,
      };
    }
    return {
      userId: (document.getElementById('userId')?.value || '').trim() || 'web_user',
      tokenStream: document.getElementById('optTokenStream')?.checked ?? true,
      memory: document.getElementById('optMemory')?.checked ?? true,
      private: document.getElementById('optPrivate')?.checked ?? false,
    };
  }

  function saveSettings() {
    if (!showPanelSettings) return;
    const s = getSettings();
    localStorage.setItem(settingsKey, JSON.stringify(s));
  }

  function restoreSettings() {
    if (!showPanelSettings) return;
    const s = JSON.parse(localStorage.getItem(settingsKey) || '{}');
    const userIdEl = el('userId');
    if (userIdEl) userIdEl.value = s.userId || (panelId === 'left' ? 'John' : 'Alice');
    const streamEl = el('optTokenStream');
    if (streamEl) streamEl.checked = s.tokenStream !== false;
    const memoryEl = el('optMemory');
    if (memoryEl) memoryEl.checked = s.memory !== false;
    const privateEl = el('optPrivate');
    if (privateEl) privateEl.checked = !!s.private;
  }

  /* ── History ── */

  function saveHistory() {
    const slim = state.messages
      .filter(m => m.role !== 'silence')
      .map(m => ({
        role: m.role,
        content: m.content,
        meta: m.meta,
        images: (m.images || []).map(() => '[image]'),
      }));
    try { localStorage.setItem(historyKey, JSON.stringify(slim)); } catch {}
  }

  function restoreHistory() {
    try {
      const raw = localStorage.getItem(historyKey);
      if (!raw) return;
      const msgs = JSON.parse(raw);
      if (!Array.isArray(msgs) || msgs.length === 0) return;
      const visibleMessages = msgs.filter(m => m?.role !== 'silence');
      if (visibleMessages.length === 0) return;
      state.messages = visibleMessages;
      if (visibleMessages.length !== msgs.length) saveHistory();
      visibleMessages.forEach(m => appendMessageBubble(m));
    } catch {}
  }

  /* ── DOM helpers ── */

  function scrollToBottom() {
    const container = el('messages');
    if (!container) return;
    requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
  }

  function focusInput() {
    const input = el('chatInput');
    if (input) requestAnimationFrame(() => input.focus({ preventScroll: true }));
  }

  function setSending(v) {
    state.sending = v;
    const sendBtn = el('sendBtn');
    const chatInput = el('chatInput');
    const observeBtn = el('observeBtn');
    const observeInput = el('observeInput');
    if (sendBtn) sendBtn.disabled = v;
    if (chatInput) chatInput.disabled = v;
    if (observeBtn) observeBtn.disabled = v;
    if (observeInput) observeInput.disabled = v;
  }

  /* ── Messages ── */

  function appendMessageBubble(message, placeholder = false) {
    const container = el('messages');
    if (!container) return {};
    const welcome = container.querySelector(`[id="${panelId}_welcome"]`);
    if (welcome) welcome.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `flex ${message.role === 'user' ? 'justify-end' : 'justify-start'}`;

    const bubble = document.createElement('div');
    const isUser = message.role === 'user';
    const isObservation = message.role === 'observation';
    const isSilence = message.role === 'silence';
    const bubbleClass = isUser
      ? 'user-bubble rounded-br-md'
      : isObservation
        ? 'observation-bubble rounded-bl-md'
        : isSilence
          ? 'silence-bubble rounded-bl-md'
          : 'assistant-bubble rounded-bl-md';
    bubble.className = `max-w-[92%] sm:max-w-[80%] lg:max-w-[68%] rounded-[24px] px-4 py-3.5 text-sm leading-relaxed ${bubbleClass}`;

    const label = document.createElement('div');
    label.className = `mb-2 text-[11px] uppercase tracking-[0.18em] ${isUser
      ? 'text-white/60 dark:text-black/50'
      : 'text-gray-400 dark:text-gray-500'}`;
    label.textContent = isUser ? 'You' : isObservation ? 'Observation' : 'xAgent';
    bubble.appendChild(label);

    if (message.meta) {
      const meta = document.createElement('div');
      meta.className = 'mb-2 text-[11px] text-gray-400 dark:text-gray-500';
      meta.textContent = message.meta;
      bubble.appendChild(meta);
    }

    const contentEl = document.createElement('div');
    contentEl.className = 'msg-content';
    if (placeholder) {
      contentEl.innerHTML = '<span class="text-gray-400">Thinking...</span>';
    } else if (message.content) {
      renderMarkdown(contentEl, message.content);
    }
    bubble.appendChild(contentEl);

    if (isUser && message.images && message.images.length) {
      const imageRow = document.createElement('div');
      imageRow.className = 'mt-2 flex flex-wrap gap-2';
      message.images.forEach((src) => {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'h-20 rounded-lg border border-white/30 object-cover';
        imageRow.appendChild(img);
      });
      bubble.appendChild(imageRow);
    }

    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    scrollToBottom();
    return { wrapper, contentEl };
  }

  /* ── Image preview ── */

  function renderImagePreview() {
    const preview = el('imagePreview');
    if (!preview) return;
    if (!state.pendingImages.length) {
      preview.classList.add('hidden');
      preview.innerHTML = '';
      return;
    }
    preview.classList.remove('hidden');
    preview.innerHTML = '';
    state.pendingImages.forEach((src, index) => {
      const item = document.createElement('div');
      item.className = 'inline-flex items-center gap-2 mr-2 mb-2 pl-1 pr-2 py-1 rounded-full border border-black/5 dark:border-white/10 bg-white/70 dark:bg-black/20 shadow-sm backdrop-blur';
      const img = document.createElement('img');
      img.src = src;
      img.className = 'h-10 w-10 rounded-full object-cover';
      const btn = document.createElement('button');
      btn.className = 'text-xs text-red-600 dark:text-red-400';
      btn.textContent = 'Remove';
      btn.addEventListener('click', () => {
        state.pendingImages.splice(index, 1);
        renderImagePreview();
      });
      item.appendChild(img);
      item.appendChild(btn);
      preview.appendChild(item);
    });
  }

  function clearPendingImages() {
    state.pendingImages = [];
    renderImagePreview();
  }

  /* ── Chat operations ── */

  function renderReplyPayload(contentEl, reply) {
    if (typeof reply === 'object' && reply !== null) {
      const text = JSON.stringify(reply, null, 2);
      contentEl.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
      return text;
    }

    const text = reply == null ? '' : String(reply);
    renderMarkdown(contentEl, text);
    return text;
  }

  function createAssistantStreamBubble() {
    const assistantMessage = { role: 'assistant', content: '' };
    state.messages.push(assistantMessage);
    const index = state.messages.length - 1;
    const { contentEl } = appendMessageBubble(assistantMessage, true);
    contentEl.classList.add('typing-cursor');
    return { contentEl, index, text: '', started: false };
  }

  function createStreamRenderState(contentEl, messageIndex) {
    contentEl.classList.add('typing-cursor');
    return {
      current: { contentEl, index: messageIndex, text: '', started: false },
      fullText: '',
    };
  }

  function ensureStreamBubble(streamState) {
    if (!streamState.current) {
      streamState.current = createAssistantStreamBubble();
    }
    return streamState.current;
  }

  function finishStreamBubble(streamState, content = null) {
    const current = ensureStreamBubble(streamState);
    const finalText = content == null ? current.text : String(content);
    current.text = finalText;
    renderMarkdown(current.contentEl, finalText);
    current.contentEl.classList.remove('typing-cursor');
    state.messages[current.index].content = finalText;
    streamState.current = null;
  }

  function handleChatStreamEvent(parsed, streamState) {
    const eventType = parsed.event || parsed.type || '';
    if (parsed.error) throw new Error(parsed.error);

    if (eventType === 'message_start') {
      const current = ensureStreamBubble(streamState);
      current.started = true;
      return;
    }

    if (eventType === 'message_delta' && parsed.delta) {
      const current = ensureStreamBubble(streamState);
      current.started = true;
      current.text += parsed.delta;
      streamState.fullText += parsed.delta;
      renderMarkdown(current.contentEl, current.text);
      scrollToBottom();
      return;
    }

    if (eventType === 'message_done') {
      finishStreamBubble(streamState, parsed.content);
      scrollToBottom();
      return;
    }

    if (parsed.message) {
      const current = ensureStreamBubble(streamState);
      current.text = renderReplyPayload(current.contentEl, parsed.message);
      streamState.fullText += current.text;
      current.contentEl.classList.remove('typing-cursor');
      state.messages[current.index].content = current.text;
      streamState.current = null;
      scrollToBottom();
    }
  }

  function webSocketUrl(path) {
    const base = API_BASE || window.location.origin;
    const url = new URL(path, base);
    url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
    return url.toString();
  }

  async function websocketChat(payload, contentEl, messageIndex) {
    contentEl.classList.add('typing-cursor');

    await new Promise((resolve, reject) => {
      const socket = new WebSocket(webSocketUrl('/ws/chat'));
      const streamState = createStreamRenderState(contentEl, messageIndex);
      let settled = false;

      const settle = (error = null) => {
        if (settled) return;
        settled = true;
        if (streamState.current) {
          streamState.current.contentEl.classList.remove('typing-cursor');
          state.messages[streamState.current.index].content = streamState.current.text;
        }
        if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
          socket.close(1000);
        }
        if (error) {
          reject(error);
        } else {
          saveHistory();
          resolve();
        }
      };

      socket.addEventListener('open', () => {
        socket.send(JSON.stringify(payload));
      });

      socket.addEventListener('message', (event) => {
        let parsed;
        try {
          parsed = JSON.parse(event.data);
        } catch {
          settle(new Error('Invalid WebSocket response.'));
          return;
        }

        if (parsed.type === 'error' || parsed.error) {
          settle(new Error(parsed.error || 'WebSocket chat failed.'));
          return;
        }

        if (parsed.type === 'message_delta' || parsed.type === 'message_start' || parsed.type === 'message_done') {
          handleChatStreamEvent(parsed, streamState);
          return;
        }

        if (parsed.type === 'done') {
          settle();
        }
      });

      socket.addEventListener('error', () => {
        settle(new Error('WebSocket connection failed.'));
      });

      socket.addEventListener('close', () => {
        if (!settled) {
          settle(new Error('WebSocket connection closed before completion.'));
        }
      });
    });
  }

  async function websocketObserve(payload) {
    return await new Promise((resolve, reject) => {
      const socket = new WebSocket(webSocketUrl('/ws/observe'));
      let settled = false;
      let result = null;

      const settle = (error = null) => {
        if (settled) return;
        settled = true;
        if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
          socket.close(1000);
        }
        if (error) {
          reject(error);
        } else {
          resolve(result);
        }
      };

      socket.addEventListener('open', () => {
        socket.send(JSON.stringify(payload));
      });

      socket.addEventListener('message', (event) => {
        let parsed;
        try {
          parsed = JSON.parse(event.data);
        } catch {
          settle(new Error('Invalid WebSocket response.'));
          return;
        }

        if (parsed.type === 'error' || parsed.error) {
          settle(new Error(parsed.error || 'WebSocket observe failed.'));
          return;
        }

        if (parsed.type === 'result') {
          result = parsed.result;
          return;
        }

        if (parsed.type === 'done') {
          settle();
        }
      });

      socket.addEventListener('error', () => {
        settle(new Error('WebSocket connection failed.'));
      });

      socket.addEventListener('close', () => {
        if (!settled) {
          settle(new Error('WebSocket connection closed before completion.'));
        }
      });
    });
  }

  async function sendMessage() {
    if (state.sending) return;
    const input = el('chatInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;

    const currentImages = [...state.pendingImages];
    clearPendingImages();

    const userMessage = { role: 'user', content: text, images: currentImages };
    state.messages.push(userMessage);
    appendMessageBubble(userMessage);

    input.value = '';
    input.style.height = 'auto';

    const settings = getSettings();
    const payload = {
      user_id: settings.userId,
      user_message: text,
      token_stream: settings.tokenStream,
      enable_memory: settings.memory,
      private: settings.private,
    };

    if (currentImages.length === 1) {
      payload.image_source = currentImages[0];
    } else if (currentImages.length > 1) {
      payload.image_source = currentImages;
    }

    setSending(true);
    saveSettings();
    if (!showPanelSettings) saveGlobalSettings();

    const assistantMessage = { role: 'assistant', content: '' };
    state.messages.push(assistantMessage);
    const messageIndex = state.messages.length - 1;
    const { contentEl } = appendMessageBubble(assistantMessage, true);

    try {
      await websocketChat(payload, contentEl, messageIndex);
    } catch (error) {
      const errText = String(error?.message || error);
      contentEl.classList.remove('typing-cursor');
      contentEl.innerHTML = `<div class="text-red-500">Error: ${escapeHtml(errText)}</div>`;
      state.messages[messageIndex].content = `Error: ${errText}`;
      saveHistory();
    } finally {
      setSending(false);
      focusInput();
      scrollToBottom();
    }
  }

  async function sendObservation() {
    if (state.sending) return;
    const input = el('observeInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;

    const source = 'web';
    const eventType = 'observation';
    const settings = getSettings();
    const observationMessage = {
      role: 'observation',
      content: text,
    };
    state.messages.push(observationMessage);
    appendMessageBubble(observationMessage);

    input.value = '';
    input.style.height = 'auto';
    setSending(true);
    saveSettings();
    if (!showPanelSettings) saveGlobalSettings();

    const payload = {
      context: text,
      source,
      event_type: eventType,
    };

    try {
      await websocketObserve(payload);
      saveHistory();
    } catch (error) {
      const errText = String(error?.message || error);
      const errorMessage = { role: 'assistant', content: `Error: ${errText}` };
      state.messages.push(errorMessage);
      const { contentEl } = appendMessageBubble(errorMessage, true);
      contentEl.innerHTML = `<div class="text-red-500">Error: ${escapeHtml(errText)}</div>`;
      saveHistory();
    } finally {
      setSending(false);
      const observeInput = el('observeInput');
      if (observeInput) requestAnimationFrame(() => observeInput.focus({ preventScroll: true }));
      scrollToBottom();
    }
  }

  function clearChat() {
    state.messages = [];
    try { localStorage.removeItem(historyKey); } catch {}
    const container = el('messages');
    if (container) container.innerHTML = welcomeHTML(panelId);
  }

  function updatePrivateIndicator() {
    // No-op for dual panels (too compact); only used in single mode via global
  }

  /* ── Event binding ── */

  function bindEvents() {
    const chatInput = el('chatInput');
    const observeInput = el('observeInput');
    const imageInput = el('imageInput');
    const sendBtn = el('sendBtn');
    const observeBtn = el('observeBtn');
    const imageBtn = el('imageBtn');
    const clearBtn = el('clearBtn');

    if (sendBtn) sendBtn.addEventListener('click', sendMessage);
    if (observeBtn) observeBtn.addEventListener('click', sendObservation);
    if (imageBtn) imageBtn.addEventListener('click', () => imageInput?.click());
    if (clearBtn) clearBtn.addEventListener('click', clearChat);

    if (imageInput) {
      imageInput.addEventListener('change', (event) => {
        const files = Array.from(event.target.files || []);
        files.forEach((file) => {
          const reader = new FileReader();
          reader.onload = (loadEvent) => {
            state.pendingImages.push(loadEvent.target.result);
            renderImagePreview();
          };
          reader.readAsDataURL(file);
        });
        event.target.value = '';
      });
    }

    if (chatInput) {
      chatInput.addEventListener('input', () => autoResize(chatInput));
      chatInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    }

    if (observeInput) {
      observeInput.addEventListener('input', () => autoResize(observeInput));
      observeInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendObservation();
        }
      });
    }

    // Panel-level settings save
    if (showPanelSettings) {
      ['userId', 'optTokenStream', 'optMemory', 'optPrivate'].forEach((suffix) => {
        const input = el(suffix);
        if (input) input.addEventListener('change', saveSettings);
      });
    }
  }

  /* ── Init ── */

  buildHTML();
  restoreSettings();
  restoreHistory();
  bindEvents();
  scrollToBottom();

  return { state, focusInput, scrollToBottom, clearChat, updatePrivateIndicator, panelId };
}

/* ═══════════════════════════════════════════════════════
   Mode switching: Single ↔ Dual
   ═══════════════════════════════════════════════════════ */

function isDualMode() {
  return document.getElementById('optDual')?.checked ?? false;
}

function mountPanels() {
  const main = document.getElementById('mainArea');
  const outerContainer = main.closest('.max-w-6xl');
  main.innerHTML = '';
  panels = [];

  if (isDualMode()) {
    // Hide global settings bar (each panel has its own)
    document.getElementById('globalSettingsBar').style.display = 'none';

    // Widen the container for dual panels
    if (outerContainer) {
      outerContainer.classList.remove('max-w-6xl');
      outerContainer.classList.add('max-w-[1600px]');
    }

    main.className = 'flex-1 min-h-0 dual-container';

    const leftDiv = document.createElement('div');
    leftDiv.className = 'chat-panel flex flex-col';
    const divider = document.createElement('div');
    divider.className = 'panel-divider';
    const rightDiv = document.createElement('div');
    rightDiv.className = 'chat-panel flex flex-col';

    main.appendChild(leftDiv);
    main.appendChild(divider);
    main.appendChild(rightDiv);

    const leftPanel = createChatPanel('left', leftDiv, {
      showPanelSettings: true,
      panelLabel: 'Left',
      panelLabelClass: 'panel-label-left',
    });

    const rightPanel = createChatPanel('right', rightDiv, {
      showPanelSettings: true,
      panelLabel: 'Right',
      panelLabelClass: 'panel-label-right',
    });

    panels.push(leftPanel, rightPanel);
    leftPanel.focusInput();
  } else {
    // Show global settings bar
    document.getElementById('globalSettingsBar').style.display = '';

    // Restore original container width
    if (outerContainer) {
      outerContainer.classList.remove('max-w-[1600px]');
      outerContainer.classList.add('max-w-6xl');
    }

    main.className = 'flex-1 min-h-0 flex flex-col overflow-hidden';

    const singleDiv = document.createElement('div');
    singleDiv.className = 'flex-1 min-h-0 flex flex-col overflow-hidden';
    main.appendChild(singleDiv);

    const singlePanel = createChatPanel('single', singleDiv, {
      showPanelSettings: false,
    });
    panels.push(singlePanel);
    singlePanel.focusInput();
  }
}

/* ─── Global private banner (single mode only) ─── */

function updateGlobalPrivateIndicator() {
  if (isDualMode()) {
    const existing = document.getElementById('privateBanner');
    if (existing) existing.remove();
    return;
  }

  const isPrivate = document.getElementById('optPrivate').checked;
  const header = document.querySelector('section.panel-surface > header');
  const existing = document.getElementById('privateBanner');

  if (isPrivate && !existing) {
    const banner = document.createElement('div');
    banner.id = 'privateBanner';
    banner.className = 'flex items-center justify-center gap-2 px-4 py-2 text-xs font-medium tracking-wide';
    banner.style.cssText = 'background: rgba(139, 92, 246, 0.10); color: #7c3aed; border-bottom: 1px solid rgba(139, 92, 246, 0.15);';
    banner.innerHTML = `
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
      <span>Private Mode — messages are ephemeral and memory writes are disabled</span>
    `;
    header.after(banner);
  } else if (!isPrivate && existing) {
    existing.remove();
  }

  const b = document.getElementById('privateBanner');
  if (b) {
    const dark = document.documentElement.classList.contains('dark');
    b.style.background = dark ? 'rgba(139, 92, 246, 0.12)' : 'rgba(139, 92, 246, 0.08)';
    b.style.color = dark ? '#a78bfa' : '#7c3aed';
    b.style.borderBottom = dark ? '1px solid rgba(139, 92, 246, 0.18)' : '1px solid rgba(139, 92, 246, 0.12)';
  }
}

/* ─── Global event wiring ─── */

function bindGlobalEvents() {
  ['userId', 'optTokenStream', 'optMemory', 'optPrivate'].forEach((id) => {
    document.getElementById(id).addEventListener('change', () => {
      saveGlobalSettings();
      updateGlobalPrivateIndicator();
    });
  });

  document.getElementById('toggleThemeBtn').addEventListener('click', toggleTheme);

  document.getElementById('clearChatBtn').addEventListener('click', () => {
    if (isDualMode()) {
      panels.forEach(p => p.clearChat());
    } else {
      panels.forEach(p => p.clearChat());
    }
  });

  // Dual mode toggle
  document.getElementById('optDual').addEventListener('change', () => {
    saveGlobalSettings();
    mountPanels();
    updateGlobalPrivateIndicator();
  });
}

/* ─── Boot ─── */

document.addEventListener('DOMContentLoaded', async () => {
  restoreGlobalSettings();
  bindGlobalEvents();
  mountPanels();
  updateGlobalPrivateIndicator();
  await checkHealth();
});
</script>
</body>
</html>
