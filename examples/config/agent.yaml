agent:
  name: "Agent"
  system_prompt: |
    You are a helpful assistant. Your task is to assist users with their queries and tasks.
  model: "gpt-4.1"

  capabilities:
    tools:
      - "web_search"  # Built-in web search
      - "draw_image"  # Built-in image generation (returns base64)
      - "char_count"  # Custom tool for counting characters
    mcp_servers:
      - "http://localhost:8001/mcp/"  # Example MCP server
      
  storage_mode: "local"  # Supported: local (SQLite + ChromaDB) and cloud (Redis + Upstash Vector)
  
server:
  host: "0.0.0.0"
  port: 8010
