agent:
  name: "StarterAgent"
  system_prompt: |
    You are a helpful assistant.
    Answer clearly and keep responses practical.
  model: "gpt-5-mini"

  capabilities:
    tools:
      - "web_search"
      - "draw_image"
      - "run_command"

  # workspace: "~/.xagent"  # Root directory for local storage (SQLite + ChromaDB)

server:
  host: "0.0.0.0"
  port: 8010
