agent:
  name: "Planner Agent"
  system_prompt: |
    You are a planning specialist.
    Turn goals into clear steps, dependencies, risks, and checkpoints.
  model: "gpt-5-mini"

  capabilities:
    tools:
      - "web_search"
  
  output_schema:
    class_name: "Plan"
    fields:
      objective:
        type: "str"
        description: "The main goal or objective to be achieved"
      steps:
        type: "list"
        items: "str"
        description: "A list of actionable steps to achieve the objective"

  storage_mode: "local"

server:
  host: "0.0.0.0"
  port: 8014
