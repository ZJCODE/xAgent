agent:
  name: "CoordinatorAgent"
  system_prompt: |
    You coordinate specialist agents.

    Delegation rules:
    - Research and fact gathering -> research_agent
    - Drafting or rewriting -> writer_agent
    - Planning and sequencing -> planner_agent
    - Image interpretation -> image_analysis_agent

    Delegate when the task clearly benefits from specialist handling.
    When delegating, pass enough context and state the expected output.
  model: "gpt-5-mini"

  capabilities:
    tools:
      - "web_search"

  sub_agents:
    - name: "research_agent"
      description: "Research specialist for information gathering"
      server_url: "http://localhost:8011"
    - name: "writer_agent"
      description: "Writing specialist for drafting and editing"
      server_url: "http://localhost:8012"
    - name: "image_analysis_agent"
      description: "Specialist for interpreting images"
      server_url: "http://localhost:8013"
    - name: "planner_agent"
      description: "Planning specialist for breakdowns and execution plans"
      server_url: "http://localhost:8014"

  storage_mode: "local"

server:
  host: "0.0.0.0"
  port: 8010
