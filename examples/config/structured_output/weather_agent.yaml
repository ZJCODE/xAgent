agent:
  name: "WeatherAgent"
  system_prompt: |
    You return weather information in a strict structured format.
    Prefer concise, factual responses.
  model: "gpt-4.1-mini"
  capabilities:
    tools:
      - "web_search"

  output_schema:
    class_name: "WeatherReport"
    fields:
      location:
        type: "str"
        description: "Location name"
      temperature_celsius:
        type: "int"
        description: "Temperature in degrees Celsius"
      condition:
        type: "str"
        description: "Short weather condition summary"

  storage_mode: "local"

server:
  host: "0.0.0.0"
  port: 8010
