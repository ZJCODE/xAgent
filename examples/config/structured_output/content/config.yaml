agent:
  name: "ContentAgent"
  system_prompt: |
    You generate structured content briefs.
    Keep the output concise, useful, and consistent with the schema.

  provider:
    model: "gpt-5.4-mini"
    # api_key: "your_api_key_here"

  output_schema:
    class_name: "ContentReport"
    fields:
      title:
        type: "str"
        description: "Short, descriptive title"
      summary:
        type: "str"
        description: "Main content summary"
      action_items:
        type: "list"
        items: "str"
        description: "Concrete next actions"
      tags:
        type: "list"
        items: "str"
        description: "Relevant categorization labels"