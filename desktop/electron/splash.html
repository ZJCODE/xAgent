<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xAgent</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #ffffff 0%, #f3f4f6 55%, #e5e7eb 100%);
      }

      .card {
        text-align: center;
        padding: 48px 40px;
        max-width: 420px;
      }

      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 18px;
        background: linear-gradient(135deg, #111827, #374151);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.04em;
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.18);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: #6b7280;
        font-size: 15px;
        line-height: 1.5;
      }

      #detail {
        margin-top: 8px;
        font-size: 13px;
        color: #9ca3af;
        min-height: 1.2em;
      }

      .spinner {
        width: 28px;
        height: 28px;
        margin: 28px auto 0;
        border: 3px solid rgba(17, 24, 39, 0.12);
        border-top-color: #111827;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f1115;
          color: #f9fafb;
        }

        body {
          background: radial-gradient(circle at top, #171a21 0%, #0f1115 60%, #090b10 100%);
        }

        p {
          color: #9ca3af;
        }

        #detail {
          color: #6b7280;
        }

        .logo {
          background: linear-gradient(135deg, #f9fafb, #d1d5db);
          color: #111827;
        }

        .spinner {
          border-color: rgba(249, 250, 251, 0.12);
          border-top-color: #f9fafb;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">xA</div>
      <h1>xAgent</h1>
      <p id="status">Starting xAgent...</p>
      <p id="detail">Preparing the application environment</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
