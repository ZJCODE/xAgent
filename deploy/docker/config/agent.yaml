agent:
  name: "MyXAgent"
  system_prompt: "You are a helpful AI agent."
  model: "gpt-5-mini"
  capabilities:
    tools:
      - "web_search"      # Built-in web search
      - "calculate_square"     # Your custom tools
      - "fetch_weather"   # Custom tool to fetch weather information
    mcp_servers:
      - "http://localhost:8001/mcp/"  # Example MCP server

  storage_mode: "local"  # Supported: local (SQLite + ChromaDB) and cloud (Redis + Upstash Vector)
  workspace: "/data/xagent"  # Root directory for local storage; mount as a Docker volume for persistence

server:
  host: "0.0.0.0"
  port: 8010
